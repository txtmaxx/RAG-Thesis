name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (Lint)
        run: ruff check .

      - name: Pyright (Typecheck)
        run: pyright

      - name: Pytest
        run: pytest -q
